<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Sesame</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; font-size: 24px; }
        .inputs { display: flex; justify-content: center; gap: 10px; }
        input { width: 60px; height: 60px; text-align: center; font-size: 48px; }
        #message { margin-top: 20px; color: red; }
        #trycount { margin-top: 20px; color: red; }
    </style>
</head>
<body>
    <h1>61 Archery Grove - Open Sesame</h1>
    <p>Please enter the six-character code to open the delivery box:</p>
    <p>You only get five chances. Please shut the lid firmly when you've deposited the delivery </p>
    <div class="inputs">
        <input id="1" maxlength="1">
        <input id="2" maxlength="1">
        <input id="3" maxlength="1">
        <input id="4" maxlength="1">
        <input id="5" maxlength="1">
        <input id="6" maxlength="1">
    </div>
    <div id="message"></div>
    <div id="trycount"></div>
    <script>
        const inputs = document.querySelectorAll('.inputs input');
        const messageEl = document.getElementById('message');
        const trycountEl = document.getElementById('trycount');

        // Connect to Server-Sent Events for trycount updates
        const eventSource = new EventSource('/events');
        eventSource.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (data.tryCount !== undefined) {
                if (data.tryCount > 0) {
                    trycountEl.textContent = 'Attempts made: ' + data.tryCount;
                } else {
                    trycountEl.textContent = '';
                }
            }
        };
        eventSource.onerror = () => {
            console.error('EventSource error');
            eventSource.close();
        };

        function focusAndSelect(el) {
            el.focus();
            el.select();
        }

        // initialize focus on first field
        focusAndSelect(inputs[0]);

        inputs.forEach(i => {
            // ensure any pre-filled character is selected when the field gains focus
            i.addEventListener('focus', () => focusAndSelect(i));

            i.addEventListener('keydown', e => {
                switch (e.key) {
                    case 'Backspace':
                        if (i.value === '') {
                            const prev = i.previousElementSibling;
                            if (prev && prev.tagName === 'INPUT') {
                                e.preventDefault();
                                prev.value = '';
                                focusAndSelect(prev);
                            }
                        }
                        break;
                    case 'ArrowLeft':
                        {
                            const prev = i.previousElementSibling;
                            if (prev && prev.tagName === 'INPUT') {
                                e.preventDefault();
                                focusAndSelect(prev);
                            }
                        }
                        break;
                    case 'ArrowRight':
                        {
                            const nxt = i.nextElementSibling;
                            if (nxt && nxt.tagName === 'INPUT') {
                                e.preventDefault();
                                focusAndSelect(nxt);
                            }
                        }
                        break;
                }
            });

            i.addEventListener('input', () => next(i));
        });

        function submitCode(code) {
            fetch('/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code })
            })
            .then(r => r.json())
            .then(d => {
                if (d.message) {
                    messageEl.textContent = d.message;
                } else {
                    inputs.forEach(i => i.value = '');
                    focusAndSelect(inputs[0]);
                }
            })
            .catch(err => {
                console.error('Fetch error:', err);
                messageEl.textContent = 'Network error - try again';
            });
        }

        function next(el) {
            if (!el.value) return; // nothing to do on empty input

            const nxt = el.nextElementSibling;
            if (nxt && nxt.tagName === 'INPUT') {
                focusAndSelect(nxt);
                return;
            }

            const code = Array.from(inputs).map(i => i.value).join('');
            if (code.length === inputs.length) {
                submitCode(code);
            }
        }
    </script>
</body>
</html>
