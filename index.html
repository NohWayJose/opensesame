<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Open Sesame</title>
	<link rel="stylesheet" href="/styles.css">
</head>
<body>
	<main aria-labelledby="opensesame-title">
		<h1 id="opensesame-title">61 Archery Grove</h1>
		<p>
			Enter the six-character code to open the delivery box. You have five attempts.
		</p>

		<div class="inputs" aria-label="Access code entry">
			<input maxlength="1" inputmode="text" aria-label="Code character 1">
			<input maxlength="1" inputmode="text" aria-label="Code character 2">
			<input maxlength="1" inputmode="text" aria-label="Code character 3">
			<input maxlength="1" inputmode="text" aria-label="Code character 4">
			<input maxlength="1" inputmode="text" aria-label="Code character 5">
			<input maxlength="1" inputmode="text" aria-label="Code character 6">
		</div>

		<div id="message" aria-live="polite"></div>
		<div id="trycount" aria-live="polite"></div>
	</main>

	<script src="/app.js" defer></script>
</body>
</html>
